<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultilytics</title>
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface2: #e8eef3;
    --accent: #74a0c0;
    --accent2: #4d7fa3;
    --green: #4a9e78;
    --red: #c0504f;
    --orange: #e08c3a;
    --text: #2b2b2b;
    --text2: #737373;
    --border: #d0dae2;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  button { cursor: pointer; font-family: inherit; border: none; border-radius: var(--radius); padding: 8px 16px; font-size: 14px; transition: opacity .15s; }
  button:active { opacity: .7; }
  input, select { font-family: inherit; font-size: 14px; padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); color: var(--text); outline: none; }
  input:focus, select:focus { border-color: var(--accent); }

  /* NAV */
  nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 12px; position: sticky; top: 0; z-index: 10; }
  nav button { background: none; color: var(--text2); padding: 12px 16px; border-radius: 0; font-weight: 500; border-bottom: 2px solid transparent; }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  nav .logo { font-weight: 700; color: var(--accent2); padding: 12px 16px 12px 4px; font-size: 15px; margin-right: auto; letter-spacing: .5px; }

  /* SCREENS */
  .screen { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
  .screen.active { display: block; }

  h2 { font-size: 18px; margin-bottom: 16px; font-weight: 600; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }

  /* FORMS */
  .form-row { display: flex; gap: 8px; margin-bottom: 16px; align-items: stretch; }
  .form-row input, .form-row select { flex: 1; }
  .btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
  .btn-green { background: var(--green); color: #fff; font-weight: 600; }
  .btn-red { background: var(--red); color: #fff; font-weight: 600; }
  .btn-small { padding: 4px 10px; font-size: 12px; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }

  /* PLAYER LIST */
  .player-item { display: flex; align-items: center; justify-content: space-between; }
  .player-item .info { display: flex; align-items: center; gap: 8px; }
  .player-item .gender { font-size: 11px; background: var(--surface2); padding: 2px 6px; border-radius: 4px; color: var(--text2); }
  .player-item .gender.female { background: #fad4d4; color: #a84444; }
  .toggle { width: 40px; height: 22px; border-radius: 11px; background: var(--surface2); position: relative; cursor: pointer; transition: background .2s; border: none; padding: 0; }
  .toggle.on { background: var(--green); }
  .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: left .2s; }
  .toggle.on::after { left: 20px; }
  .sort-bar { display: flex; gap: 8px; margin-bottom: 12px; }
  .sort-bar button { font-size: 12px; }

  /* GAME LIST */
  .game-item { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .game-item:hover { border-color: var(--accent); }
  .game-date { font-size: 12px; color: var(--text2); }
  .division-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 500; }
  .division-badge.mixed   { background: #ddeaf5; color: #3a6f96; }
  .division-badge.womens  { background: #fad4d4; color: #a84444; }
  .division-badge.open    { background: #d6f0e0; color: #2e7d52; }

  /* SCORE BAR */
  .score-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; margin-bottom: 16px; display: flex; justify-content: center; align-items: center; gap: 20px; }
  .score-bar .score { font-size: 28px; font-weight: 700; }
  .score-bar .dash { font-size: 20px; color: var(--text2); }
  .score-bar .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }

  /* OFFENSE/DEFENSE SELECTOR */
  .od-selector { display: flex; gap: 8px; margin-bottom: 16px; }
  .od-selector button { flex: 1; padding: 14px; font-size: 15px; font-weight: 600; border: 2px solid var(--border); background: var(--surface); color: var(--text2); }
  .od-selector button.selected { border-color: var(--accent); color: var(--accent); background: var(--surface2); }

  /* PLAYER CARDS */
  .lineup-zone { min-height: 56px; border: 2px dashed var(--border); border-radius: var(--radius); padding: 8px; display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; align-items: center; }
  .lineup-zone .placeholder { color: var(--text2); font-size: 13px; width: 100%; text-align: center; }
  .player-cards { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .pcard { padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; user-select: none; transition: all .15s; border: none; }
  .pcard.available { background: var(--surface2); color: var(--text); }
  .pcard.available.male   { background: #ddeaf5; color: #3a6f96; }
  .pcard.available.female { background: #fad4d4; color: #a84444; }
  .pcard.selected { background: var(--accent); color: #fff; }
  .pcard.selected.male   { background: #3a6f96; }
  .pcard.selected.female { background: #a84444; }
  .pcard.greyed { background: var(--surface); color: var(--text2); opacity: .4; }

  /* POINT TRACKING TABLE */
  .point-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .point-table th { text-align: center; padding: 6px 2px; color: var(--text2); font-weight: 500; font-size: 11px; text-transform: uppercase; }
  .point-table th:first-child { text-align: left; }
  .point-table td { text-align: center; padding: 6px 2px; border-top: 1px solid var(--border); }
  .point-table td:first-child { text-align: left; font-weight: 500; }
  .point-table .cnt-cell { display: flex; align-items: center; justify-content: center; gap: 2px; }
  .point-table .cnt-btn { width: 22px; height: 22px; border-radius: 4px; font-size: 14px; display: flex; align-items: center; justify-content: center; background: var(--surface2); color: var(--text); border: none; padding: 0; line-height: 1; }
  .point-table .cnt-val { min-width: 18px; text-align: center; }
  .point-table .chk { width: 18px; height: 18px; accent-color: var(--accent); }
  .goal-btn { background: var(--green); color: #fff; font-weight: 700; padding: 4px 10px; font-size: 12px; border: none; border-radius: 4px; }

  /* STATS TABLE */
  .stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .stats-table th { text-align: center; padding: 8px 4px; color: var(--text2); font-weight: 500; font-size: 11px; text-transform: uppercase; cursor: pointer; }
  .stats-table th:first-child { text-align: left; }
  .stats-table th:hover { color: var(--accent); }
  .stats-table td { text-align: center; padding: 8px 4px; border-top: 1px solid var(--border); }
  .stats-table td:first-child { text-align: left; font-weight: 500; }

  /* TEAM SUMMARY */
  .team-summary { margin-bottom: 20px; }
  .team-summary h3 { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
  .summary-cards { display: flex; gap: 8px; flex-wrap: wrap; }
  .summary-card { flex: 1; min-width: 140px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .summary-card .sc-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .summary-card .sc-value { font-size: 24px; font-weight: 700; color: var(--accent2); line-height: 1; margin-bottom: 4px; }
  .summary-card .sc-sub { font-size: 12px; color: var(--text2); }
  .summary-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 4px; }
  .summary-table th { text-align: center; padding: 6px 4px; color: var(--text2); font-weight: 500; font-size: 11px; text-transform: uppercase; }
  .summary-table th:first-child { text-align: left; }
  .summary-table td { text-align: center; padding: 6px 4px; border-top: 1px solid var(--border); }
  .summary-table td:first-child { text-align: left; font-weight: 500; }
  .summary-table tr.total-row td { font-weight: 700; border-top: 2px solid var(--border); }
  .summary-table tr.avg-row td { color: var(--text2); font-style: italic; }

  /* PLAYER MATRIX */
  .mat-section { margin-top: 28px; }
  .mat-section h3 { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .mat-scroll { overflow-x: auto; }
  .mat-table { border-collapse: collapse; font-size: 11px; }
  .mat-table th, .mat-table td { border: 1px solid var(--border); }
  .mat-col-hdr { writing-mode: vertical-lr; transform: rotate(180deg); padding: 8px 4px; font-weight: 600; font-size: 11px; white-space: nowrap; }
  .mat-row-hdr { padding: 4px 8px; font-weight: 600; font-size: 11px; white-space: nowrap; background: var(--surface); position: sticky; left: 0; z-index: 1; }
  .mat-cell { padding: 0; text-align: center; min-width: 72px; vertical-align: middle; }
  .mat-cell.mat-empty { background: var(--bg); }
  .mat-cell.mat-diag { outline: 2px solid var(--border); outline-offset: -2px; }
  .mat-cell-inner { display: grid; grid-template-columns: 1fr 1fr; }
  .mc-top { grid-column: 1/3; padding: 3px 4px; border-bottom: 1px solid var(--border); }
  .mc-d   { padding: 3px 4px; border-right: 1px solid var(--border); }
  .mc-o   { padding: 3px 4px; }
  .mc-top, .mc-d, .mc-o { text-align: center; }
  .mat-n  { font-weight: 700; font-size: 12px; line-height: 1.2; }
  .mat-p  { font-size: 11px; line-height: 1.2; }
  .mat-lbl { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: .3px; }
  .mat-diag .mat-n  { font-size: 13px; }
  .mat-diag .mat-p  { font-size: 12px; font-weight: 600; }
  .mat-diag .mat-lbl { font-size: 10px; }

  /* PLAYER DETAIL */
  .pd-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .pd-avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .pd-avatar.male { background: #3a6f96; }
  .pd-avatar.female { background: #a84444; }
  .pd-name { font-size: 20px; font-weight: 700; }
  .pd-gender { font-size: 12px; color: var(--text2); }
  .pd-layout { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
  .pd-stats { flex: 1; min-width: 220px; }
  .pd-radar { flex: 1; min-width: 260px; display: flex; justify-content: center; }
  .pd-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .pd-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); }
  .pd-table .pd-label { text-align: right; color: var(--text2); font-weight: 500; }
  .pd-table .pd-val { text-align: left; font-weight: 700; min-width: 40px; }
  .pd-table .pd-weight { font-size: 12px; font-weight: 600; min-width: 24px; text-align: right; }
  .pd-table .pd-weight.pos { color: var(--green); }
  .pd-table .pd-weight.neg { color: var(--red); }
  .pd-table .pd-total td { border-top: 2px solid var(--border); border-bottom: none; font-weight: 700; }
  .pd-section { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; padding: 10px 8px 4px; }

  /* CSV BAR */
  .csv-bar { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .back-btn { margin-bottom: 12px; }

  /* misc */
  .empty { color: var(--text2); font-size: 14px; text-align: center; padding: 24px 0; }
  .mb { margin-bottom: 16px; }
  .mt { margin-top: 16px; }
</style>
</head>
<body>

<nav>
  <span class="logo">Ultilytics</span>
  <button onclick="showScreen('team')" id="nav-team">Team</button>
  <button onclick="showScreen('games')" id="nav-games">Games</button>
  <button onclick="showStats(null)" id="nav-stats">Stats</button>
</nav>

<!-- TEAM SCREEN -->
<div class="screen" id="screen-team">
  <h2>Manage Team</h2>
  <div class="form-row">
    <input id="player-name" placeholder="Player name" />
    <select id="player-gender"><option value="M">M</option><option value="F">F</option></select>
    <button class="btn-primary" onclick="addPlayer()">Add</button>
  </div>
  <div class="sort-bar">
    <span style="font-size:12px;color:var(--text2)">Sort:</span>
    <button class="btn-outline btn-small" onclick="sortPlayers('name')">Name</button>
    <button class="btn-outline btn-small" onclick="sortPlayers('active')">Status</button>
  </div>
  <div id="player-list"></div>
  <div class="csv-bar">
    <button class="btn-outline btn-small" onclick="exportCSV()">Export All Data (CSV)</button>
    <button class="btn-outline btn-small" onclick="document.getElementById('csv-import').click()">Import CSV</button>
    <input type="file" id="csv-import" accept=".csv" style="display:none" onchange="importCSV(event)" />
  </div>
</div>

<!-- PLAYER DETAIL -->
<div class="screen" id="screen-player-detail">
  <button class="btn-outline btn-small back-btn" onclick="showScreen('team')">Back to team</button>
  <div id="pd-header"></div>
  <div class="pd-layout">
    <div class="pd-stats" id="pd-stats"></div>
    <div class="pd-radar" id="pd-radar"></div>
  </div>
</div>

<!-- GAMES SCREEN -->
<div class="screen" id="screen-games">
  <h2>Games</h2>
  <div class="form-row">
    <input id="game-name" placeholder="Game name" />
    <input id="game-date" type="date" />
    <select id="game-division">
      <option value="Mixed">Mixed</option>
      <option value="Women's">Women's</option>
      <option value="Open">Open</option>
    </select>
    <button class="btn-primary" onclick="addGame()">New</button>
  </div>
  <div id="game-list"></div>
</div>

<!-- GAME: BEFORE POINT -->
<div class="screen" id="screen-before-point">
  <button class="btn-outline btn-small back-btn" onclick="leaveGame()">Back to games</button>
  <div class="score-bar" id="bp-score"></div>
  <div class="od-selector">
    <button id="od-offense" onclick="setOD('O')">Offense</button>
    <button id="od-defense" onclick="setOD('D')">Defense</button>
  </div>
  <div class="lineup-zone" id="lineup-zone"><span class="placeholder">Tap players below to add (max 7)</span></div>
  <div class="player-cards" id="available-players"></div>
  <button class="btn-primary" style="width:100%;padding:14px;font-size:15px;" onclick="startPoint()">Start Point</button>
</div>

<!-- GAME: DURING POINT -->
<div class="screen" id="screen-during-point">
  <div class="score-bar" id="dp-score"></div>
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <button class="btn-red" style="flex:1;padding:12px;font-size:14px;" onclick="otherTeamScored()">Other Team Scored</button>
    <button class="btn-outline" style="padding:12px;font-size:14px;" onclick="editLineup()">Edit Lineup</button>
  </div>
  <table class="point-table" id="point-table"></table>
</div>

<!-- STATS SCREEN -->
<div class="screen" id="screen-stats">
  <button class="btn-outline btn-small back-btn" onclick="showScreen('games')">Back to games</button>
  <h2 id="stats-title">Statistics</h2>
  <div class="team-summary" id="team-summary"></div>
  <h3 id="stats-players-header" style="font-size:14px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">Players</h3>
  <table class="stats-table" id="stats-table"></table>
  <div id="player-matrix"></div>
  <div class="csv-bar" id="stats-csv-bar"></div>
</div>

<script>
// ─── DATA ──────────────────────────────────────────────
let state = loadState();

function defaultState() {
  return { players: [], games: [], pointLog: [] };
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('ultilytics'));
    if (s && s.players) return s;
  } catch {}
  return defaultState();
}

function save() { localStorage.setItem('ultilytics', JSON.stringify(state)); }

// ─── NAV ───────────────────────────────────────────────
let currentScreen = 'team';
let currentGameId = null;
let currentOD = 'O';
let lineupPlayerIds = [];
let pointStats = {}; // { playerId: { pull, defense, turnover, drop, assist, goal } }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + id);
  if (nb) nb.classList.add('active');
  currentScreen = id;
  if (id === 'team') renderPlayers();
  if (id === 'games') renderGames();
}

// ─── TEAM ──────────────────────────────────────────────
let playerSort = 'name';

function addPlayer() {
  const nameEl = document.getElementById('player-name');
  const name = nameEl.value.trim();
  if (!name) return;
  const gender = document.getElementById('player-gender').value;
  state.players.push({ id: uid(), name, gender, active: true });
  nameEl.value = '';
  save(); renderPlayers();
}

function toggleActive(id) {
  const p = state.players.find(p => p.id === id);
  if (p) p.active = !p.active;
  save(); renderPlayers();
}

function sortPlayers(by) { playerSort = by; renderPlayers(); }

function renderPlayers() {
  const list = document.getElementById('player-list');
  let sorted = [...state.players];
  if (playerSort === 'name') sorted.sort((a, b) => a.name.localeCompare(b.name));
  else sorted.sort((a, b) => (b.active ? 1 : 0) - (a.active ? 1 : 0) || a.name.localeCompare(b.name));
  if (!sorted.length) { list.innerHTML = '<div class="empty">No players yet</div>'; return; }
  list.innerHTML = sorted.map(p => `
    <div class="card player-item">
      <div class="info">
        <span style="cursor:pointer;text-decoration:underline;text-decoration-color:var(--border)" onclick="event.stopPropagation();showPlayerDetail('${p.id}')">${esc(p.name)}</span>
        <span class="gender${p.gender === 'F' ? ' female' : ''}">${p.gender}</span>
      </div>
      <button class="toggle ${p.active ? 'on' : ''}" onclick="toggleActive('${p.id}')"></button>
    </div>`).join('');
}

// ─── PLAYER DETAIL ─────────────────────────────────────
function showPlayerDetail(playerId) {
  const player = state.players.find(p => p.id === playerId);
  if (!player) return;

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-player-detail').classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-team').classList.add('active');

  // header
  const initials = player.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  const gc = player.gender === 'F' ? 'female' : 'male';
  document.getElementById('pd-header').innerHTML = `
    <div class="pd-header">
      <div class="pd-avatar ${gc}">${initials}</div>
      <div>
        <div class="pd-name">${esc(player.name)}</div>
        <div class="pd-gender">${player.gender === 'F' ? 'Female' : 'Male'}</div>
      </div>
    </div>`;

  // compute stats from pointLog
  const logs = state.pointLog.filter(r => r.playerId === playerId);
  const points = new Map();
  logs.forEach(r => {
    const key = r.gameId + ':' + r.score;
    if (!points.has(key)) points.set(key, { od: r.od, won: r.weScored });
  });

  const games = new Set(logs.map(r => r.gameId)).size;
  const totalPoints = points.size;
  const oPoints = [...points.values()].filter(p => p.od === 'O').length;
  const dPoints = [...points.values()].filter(p => p.od === 'D').length;

  let goals = 0, assists = 0, pulls = 0, defenses = 0, turnovers = 0, drops = 0;
  logs.forEach(r => {
    goals += r.goal; assists += r.assist; pulls += r.pull;
    defenses += r.defense; turnovers += r.turnover; drops += r.drop;
  });
  const total = defenses - turnovers - drops + assists + goals;

  // stats table
  document.getElementById('pd-stats').innerHTML = `
    <table class="pd-table">
      <tr><td class="pd-section" colspan="3">Overview</td></tr>
      <tr><td class="pd-label">Games Played</td><td class="pd-val" colspan="2">${games}</td></tr>
      <tr><td class="pd-label">Points Played</td><td class="pd-val" colspan="2">${totalPoints}</td></tr>
      <tr><td class="pd-label">Offense Points</td><td class="pd-val" colspan="2">${oPoints}</td></tr>
      <tr><td class="pd-label">Defense Points</td><td class="pd-val" colspan="2">${dPoints}</td></tr>
      <tr><td class="pd-section" colspan="3">Performance</td></tr>
      <tr><td class="pd-weight pos">+1</td><td class="pd-label">Goals</td><td class="pd-val">${goals}</td></tr>
      <tr><td class="pd-weight pos">+1</td><td class="pd-label">Assists</td><td class="pd-val">${assists}</td></tr>
      <tr><td class="pd-weight pos">+1</td><td class="pd-label">Defenses</td><td class="pd-val">${defenses}</td></tr>
      <tr><td class="pd-weight"></td><td class="pd-label">Pulls</td><td class="pd-val">${pulls}</td></tr>
      <tr><td class="pd-weight neg">&minus;1</td><td class="pd-label">Turnovers</td><td class="pd-val">${turnovers}</td></tr>
      <tr><td class="pd-weight neg">&minus;1</td><td class="pd-label">Drops</td><td class="pd-val">${drops}</td></tr>
      <tr class="pd-total"><td class="pd-weight">=</td><td class="pd-label">Total</td><td class="pd-val" style="color:${total >= 0 ? 'var(--green)' : 'var(--red)'}">${total >= 0 ? '+' : ''}${total}</td></tr>
    </table>`;

  // radar chart: compare player vs team average
  renderRadarChart(playerId);
}

function renderRadarChart(playerId) {
  const container = document.getElementById('pd-radar');
  const allLogs = state.pointLog;
  if (allLogs.length < 1) { container.innerHTML = '<div class="empty">No data yet</div>'; return; }

  // compute per-player totals for all players with data
  const pAgg = {};
  allLogs.forEach(r => {
    if (!pAgg[r.playerId]) pAgg[r.playerId] = { goals:0, assists:0, defenses:0, pulls:0, turnovers:0, drops:0, points:0, _pts: new Set() };
    const a = pAgg[r.playerId];
    a.goals += r.goal; a.assists += r.assist; a.defenses += r.defense;
    a.pulls += r.pull; a.turnovers += r.turnover; a.drops += r.drop;
    a._pts.add(r.gameId + ':' + r.score);
  });
  Object.values(pAgg).forEach(a => { a.points = a._pts.size; });

  const labels = ['Goals', 'Assists', 'Defenses', 'Pulls', 'Turnovers', 'Drops'];
  const keys   = ['goals', 'assists', 'defenses', 'pulls', 'turnovers', 'drops'];

  // normalize per point played
  const perPt = (a, k) => a.points ? a[k] / a.points : 0;

  // team averages (mean of all players' per-point rates)
  const allPlayers = Object.values(pAgg);
  const teamAvg = keys.map(k => {
    const sum = allPlayers.reduce((s, a) => s + perPt(a, k), 0);
    return allPlayers.length ? sum / allPlayers.length : 0;
  });

  const me = pAgg[playerId];
  const myVals = me ? keys.map(k => perPt(me, k)) : keys.map(() => 0);

  // max across all players for scaling
  const maxVals = keys.map(k => Math.max(...allPlayers.map(a => perPt(a, k)), 0.001));

  // normalize to 0..1
  const normMe  = myVals.map((v, i) => v / maxVals[i]);
  const normAvg = teamAvg.map((v, i) => v / maxVals[i]);

  // draw SVG
  const w = 280, h = 280, cx = w/2, cy = h/2, R = 100;
  const n = labels.length;
  const angle = (i) => (Math.PI * 2 * i / n) - Math.PI / 2;
  const pt = (a, scale) => ({ x: cx + R * scale * Math.cos(a), y: cy + R * scale * Math.sin(a) });
  const poly = (vals) => vals.map((v, i) => { const p = pt(angle(i), v); return p.x + ',' + p.y; }).join(' ');

  let svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="max-width:100%">`;

  // grid
  [0.25, 0.5, 0.75, 1.0].forEach(s => {
    const pts = [];
    for (let i = 0; i < n; i++) { const p = pt(angle(i), s); pts.push(p.x + ',' + p.y); }
    svg += `<polygon points="${pts.join(' ')}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
  });

  // axes + labels
  for (let i = 0; i < n; i++) {
    const p1 = pt(angle(i), 1);
    svg += `<line x1="${cx}" y1="${cy}" x2="${p1.x}" y2="${p1.y}" stroke="var(--border)" stroke-width="1"/>`;
    const lp = pt(angle(i), 1.22);
    svg += `<text x="${lp.x}" y="${lp.y}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="500" fill="var(--text2)">${labels[i]}</text>`;
  }

  // team average polygon
  svg += `<polygon points="${poly(normAvg)}" fill="rgba(180,180,180,0.25)" stroke="#aaa" stroke-width="1.5"/>`;

  // player polygon
  svg += `<polygon points="${poly(normMe)}" fill="rgba(116,160,192,0.35)" stroke="var(--accent)" stroke-width="2"/>`;

  // dots on player polygon
  for (let i = 0; i < n; i++) {
    const p = pt(angle(i), normMe[i]);
    svg += `<circle cx="${p.x}" cy="${p.y}" r="3" fill="var(--accent)"/>`;
  }

  svg += '</svg>';

  // legend
  svg += `<div style="display:flex;gap:16px;justify-content:center;font-size:11px;color:var(--text2);margin-top:4px;">
    <span><span style="display:inline-block;width:12px;height:12px;background:rgba(180,180,180,0.4);border:1px solid #aaa;border-radius:2px;vertical-align:middle;margin-right:3px"></span>Team Avg</span>
    <span><span style="display:inline-block;width:12px;height:12px;background:rgba(116,160,192,0.5);border:1px solid var(--accent);border-radius:2px;vertical-align:middle;margin-right:3px"></span>${esc(state.players.find(p => p.id === playerId)?.name || '')}</span>
  </div>`;

  container.innerHTML = svg;
}

// ─── GAMES ─────────────────────────────────────────────
function addGame() {
  const nameEl = document.getElementById('game-name');
  const dateEl = document.getElementById('game-date');
  const name = nameEl.value.trim();
  if (!name) return;
  const date = dateEl.value || new Date().toISOString().slice(0, 10);
  const division = document.getElementById('game-division').value;
  state.games.push({ id: uid(), name, date, division, us: 0, them: 0 });
  nameEl.value = ''; dateEl.value = '';
  save(); renderGames();
}

function renderGames() {
  const list = document.getElementById('game-list');
  if (!state.games.length) { list.innerHTML = '<div class="empty">No games yet</div>'; return; }
  list.innerHTML = state.games.slice().reverse().map(g => `
    <div class="card game-item" onclick="enterGame('${g.id}')">
      <div>
        <div style="display:flex;align-items:center;gap:6px;">${esc(g.name)}${divisionBadge(g.division)}</div>
        <div class="game-date">${g.date}</div>
      </div>
      <div style="display:flex;gap:12px;align-items:center;">
        <span style="font-weight:600">${g.us} - ${g.them}</span>
        <button class="btn-outline btn-small" onclick="event.stopPropagation();showStats('${g.id}')">Stats</button>
      </div>
    </div>`).join('');
}

// ─── ENTER / LEAVE GAME ────────────────────────────────
function enterGame(id) {
  currentGameId = id;
  lineupPlayerIds = [];
  const g = state.games.find(g => g.id === id);
  // preselect O/D based on last scorer
  const gameLogs = state.pointLog.filter(r => r.gameId === id);
  if (gameLogs.length === 0) { currentOD = 'O'; }
  else {
    const lastLog = gameLogs[gameLogs.length - 1];
    currentOD = lastLog.weScored ? 'D' : 'O';
  }
  showBeforePoint();
}

function leaveGame() { currentGameId = null; showScreen('games'); }

function showBeforePoint() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-before-point').classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  renderScoreBar('bp-score');
  document.getElementById('od-offense').className = currentOD === 'O' ? 'selected' : '';
  document.getElementById('od-defense').className = currentOD === 'D' ? 'selected' : '';
  renderLineup();
}

function setOD(v) {
  currentOD = v;
  document.getElementById('od-offense').className = v === 'O' ? 'selected' : '';
  document.getElementById('od-defense').className = v === 'D' ? 'selected' : '';
}

function renderScoreBar(elId) {
  const g = state.games.find(g => g.id === currentGameId);
  document.getElementById(elId).innerHTML = `
    <div><div class="label">Us</div><div class="score">${g.us}</div></div>
    <div class="dash">:</div>
    <div><div class="label">Them</div><div class="score">${g.them}</div></div>`;
}

function renderLineup() {
  const zone = document.getElementById('lineup-zone');
  const pool = document.getElementById('available-players');
  const active = state.players.filter(p => p.active).sort((a, b) => a.name.localeCompare(b.name));
  const sortedLineup = [...lineupPlayerIds].sort((a, b) => {
    const pa = state.players.find(p => p.id === a);
    const pb = state.players.find(p => p.id === b);
    return pa.name.localeCompare(pb.name);
  });

  if (lineupPlayerIds.length === 0) {
    zone.innerHTML = '<span class="placeholder">Tap players below to add (max 7)</span>';
  } else {
    zone.innerHTML = sortedLineup.map(id => {
      const p = state.players.find(p => p.id === id);
      const g = p.gender === 'F' ? 'female' : 'male';
      return `<button class="pcard selected ${g}" onclick="removeFromLineup('${id}')">${esc(p.name)}</button>`;
    }).join('');
  }

  pool.innerHTML = active.map(p => {
    const inLineup = lineupPlayerIds.includes(p.id);
    const g = p.gender === 'F' ? 'female' : 'male';
    return `<button class="pcard ${inLineup ? 'greyed' : 'available ' + g}" onclick="${inLineup ? '' : "addToLineup('" + p.id + "')"}">${esc(p.name)}</button>`;
  }).join('');
}

function addToLineup(id) {
  if (lineupPlayerIds.length >= 7 || lineupPlayerIds.includes(id)) return;
  lineupPlayerIds.push(id);
  renderLineup();
}

function removeFromLineup(id) {
  lineupPlayerIds = lineupPlayerIds.filter(x => x !== id);
  renderLineup();
}

// ─── DURING POINT ──────────────────────────────────────
function startPoint() {
  if (lineupPlayerIds.length === 0) return;
  const oldStats = pointStats;
  pointStats = {};
  lineupPlayerIds.forEach(id => {
    pointStats[id] = oldStats[id] || { pull: false, defense: 0, turnover: 0, drop: 0, assist: false, goal: false };
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-during-point').classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  renderScoreBar('dp-score');
  renderPointTable();
}

function renderPointTable() {
  const table = document.getElementById('point-table');
  const sortedIds = [...lineupPlayerIds].sort((a, b) => {
    const pa = state.players.find(p => p.id === a);
    const pb = state.players.find(p => p.id === b);
    return pa.name.localeCompare(pb.name);
  });
  let html = `<thead><tr><th>Player</th><th>Pull</th><th>Defense</th><th>Turnover</th><th>Drop</th><th>Assist</th><th>Goal</th></tr></thead><tbody>`;
  sortedIds.forEach(id => {
    const p = state.players.find(p => p.id === id);
    const s = pointStats[id];
    html += `<tr>
      <td>${esc(p.name)}</td>
      <td><input type="checkbox" class="chk" ${s.pull ? 'checked' : ''} onchange="setPull('${id}',this.checked)" /></td>
      <td><div class="cnt-cell"><button class="cnt-btn" onclick="adj('${id}','defense',-1)">&minus;</button><span class="cnt-val">${s.defense}</span><button class="cnt-btn" onclick="adj('${id}','defense',1)">+</button></div></td>
      <td><div class="cnt-cell"><button class="cnt-btn" onclick="adj('${id}','turnover',-1)">&minus;</button><span class="cnt-val">${s.turnover}</span><button class="cnt-btn" onclick="adj('${id}','turnover',1)">+</button></div></td>
      <td><div class="cnt-cell"><button class="cnt-btn" onclick="adj('${id}','drop',-1)">&minus;</button><span class="cnt-val">${s.drop}</span><button class="cnt-btn" onclick="adj('${id}','drop',1)">+</button></div></td>
      <td><input type="checkbox" class="chk" ${s.assist ? 'checked' : ''} onchange="setAssist('${id}',this.checked)" /></td>
      <td><button class="goal-btn" onclick="playerGoal('${id}')">Goal</button></td>
    </tr>`;
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function setPull(id, checked) {
  // only one player can have pull
  lineupPlayerIds.forEach(pid => { pointStats[pid].pull = false; });
  if (checked) pointStats[id].pull = true;
  renderPointTable();
}

function setAssist(id, checked) {
  // only one player can have assist
  lineupPlayerIds.forEach(pid => { pointStats[pid].assist = false; });
  if (checked) pointStats[id].assist = true;
  renderPointTable();
}

function editLineup() {
  // go back to roster screen, keep current lineup but allow changes
  showBeforePoint();
}

function adj(id, stat, d) {
  pointStats[id][stat] = Math.max(0, pointStats[id][stat] + d);
  renderPointTable();
}

function playerGoal(id) {
  pointStats[id].goal = true;
  endPoint(true);
}

function otherTeamScored() { endPoint(false); }

function endPoint(weScored) {
  const g = state.games.find(g => g.id === currentGameId);
  if (weScored) g.us++; else g.them++;
  const score = g.us + '-' + g.them;

  lineupPlayerIds.forEach(pid => {
    const s = pointStats[pid];
    state.pointLog.push({
      gameId: currentGameId,
      gameName: g.name,
      score,
      playerId: pid,
      playerName: state.players.find(p => p.id === pid).name,
      od: currentOD,
      pull: s.pull ? 1 : 0,
      defense: s.defense,
      turnover: s.turnover,
      drop: s.drop,
      assist: s.assist ? 1 : 0,
      goal: s.goal ? 1 : 0,
      weScored
    });
  });

  save();
  // reset for next point
  pointStats = {};
  currentOD = weScored ? 'D' : 'O';
  lineupPlayerIds = [];
  showBeforePoint();
}

// ─── STATS ─────────────────────────────────────────────
let statsSortCol = 'points';
let statsSortDir = -1;

function showStats(gameId) {
  currentGameId = gameId;
  statsSortCol = 'points';
  statsSortDir = -1;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-stats').classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  if (gameId) {
    const g = state.games.find(g => g.id === gameId);
    document.getElementById('stats-title').textContent = 'Stats: ' + g.name;
  } else {
    document.getElementById('stats-title').textContent = 'Overall Stats (All Games)';
    document.getElementById('nav-stats').classList.add('active');
  }
  const csvBar = document.getElementById('stats-csv-bar');
  if (gameId) {
    csvBar.innerHTML = '<button class="btn-outline btn-small" onclick="exportGameCSV()">Export Game CSV</button>';
  } else {
    csvBar.innerHTML = '<button class="btn-outline btn-small" onclick="exportAllGamesCSV()">Download All Game Data (CSV)</button>';
  }
  renderStats(gameId);
}

function pct(n, total) { return total ? Math.round(n / total * 100) + '%' : '—'; }

function getPointStats(logs) {
  const points = new Map();
  logs.forEach(r => {
    const key = r.gameId + ':' + r.score;
    if (!points.has(key)) points.set(key, { od: r.od, weScored: r.weScored });
  });
  const vals = [...points.values()];
  return {
    played:  vals.length,
    dPlayed: vals.filter(p => p.od === 'D').length,
    oPlayed: vals.filter(p => p.od === 'O').length,
    won:     vals.filter(p => p.weScored).length,
    dWon:    vals.filter(p => p.od === 'D' && p.weScored).length,
    oWon:    vals.filter(p => p.od === 'O' && p.weScored).length,
  };
}

function renderTeamSummary(gameId) {
  const el = document.getElementById('team-summary');
  const logs = gameId ? state.pointLog.filter(r => r.gameId === gameId) : state.pointLog;
  if (!logs.length) { el.innerHTML = ''; return; }

  if (gameId) {
    const s = getPointStats(logs);
    el.innerHTML = `
      <h3>Team Summary</h3>
      <div class="summary-cards">
        <div class="summary-card">
          <div class="sc-label">Points Played</div>
          <div class="sc-value">${s.played}</div>
          <div class="sc-sub">Defense: ${s.dPlayed} &nbsp;·&nbsp; Offense: ${s.oPlayed}</div>
        </div>
        <div class="summary-card">
          <div class="sc-label">Points Won</div>
          <div class="sc-value">${pct(s.won, s.played)}</div>
          <div class="sc-sub">Defense: ${pct(s.dWon, s.dPlayed)} &nbsp;·&nbsp; Offense: ${pct(s.oWon, s.oPlayed)}</div>
        </div>
      </div>`;
  } else {
    const gameIds = [...new Set(logs.map(r => r.gameId))];
    const rows = gameIds.map(gid => {
      const g = state.games.find(g => g.id === gid);
      const s = getPointStats(logs.filter(r => r.gameId === gid));
      return { name: g ? g.name : '?', ...s };
    });
    const n = rows.length;
    const sum = rows.reduce((acc, r) => {
      acc.played += r.played; acc.dPlayed += r.dPlayed; acc.oPlayed += r.oPlayed;
      acc.won += r.won; acc.dWon += r.dWon; acc.oWon += r.oWon;
      return acc;
    }, { played:0, dPlayed:0, oPlayed:0, won:0, dWon:0, oWon:0 });
    const fmt = v => Number.isInteger(v) ? v : v.toFixed(1);
    const avg = { played: sum.played/n, dPlayed: sum.dPlayed/n, oPlayed: sum.oPlayed/n, won: sum.won/n, dWon: sum.dWon/n, oWon: sum.oWon/n };

    const th = (t) => `<th>${t}</th>`;
    const td = (v) => `<td>${fmt(v)}</td>`;
    const tdp = (v, total) => `<td>${pct(v, total)}</td>`;
    let html = `<h3>Team Summary</h3>
      <table class="summary-table">
        <thead><tr>${['Game','Played','D','O','Won %','D Won %','O Won %'].map(th).join('')}</tr></thead>
        <tbody>
          ${rows.map(r => `<tr><td>${esc(r.name)}</td>${td(r.played)}${td(r.dPlayed)}${td(r.oPlayed)}${tdp(r.won,r.played)}${tdp(r.dWon,r.dPlayed)}${tdp(r.oWon,r.oPlayed)}</tr>`).join('')}
          <tr class="total-row"><td>Total</td>${td(sum.played)}${td(sum.dPlayed)}${td(sum.oPlayed)}${tdp(sum.won,sum.played)}${tdp(sum.dWon,sum.dPlayed)}${tdp(sum.oWon,sum.oPlayed)}</tr>
          <tr class="avg-row"><td>Avg / game</td>${td(avg.played)}${td(avg.dPlayed)}${td(avg.oPlayed)}${tdp(sum.won,sum.played)}${tdp(sum.dWon,sum.dPlayed)}${tdp(sum.oWon,sum.oPlayed)}</tr>
        </tbody>
      </table>`;
    el.innerHTML = html;
  }
}

function renderStats(gameId) {
  const logs = gameId ? state.pointLog.filter(r => r.gameId === gameId) : state.pointLog;
  // aggregate per player
  const agg = {};
  logs.forEach(r => {
    if (!agg[r.playerId]) agg[r.playerId] = { name: r.playerName, points: 0, dPoints: 0, oPoints: 0, games: 0, pulls: 0, defenses: 0, turnovers: 0, drops: 0, assists: 0, goals: 0 };
    const a = agg[r.playerId];
    const key = r.gameId + ':' + r.score;
    a._scores = a._scores || new Set();
    a._scores.add(key);
    a._dScores = a._dScores || new Set();
    if (r.od === 'D') a._dScores.add(key);
    a._oScores = a._oScores || new Set();
    if (r.od === 'O') a._oScores.add(key);
    a._games = a._games || new Set();
    a._games.add(r.gameId);
    a.pulls += r.pull;
    a.defenses += r.defense;
    a.turnovers += r.turnover;
    a.drops += r.drop;
    a.assists += r.assist;
    a.goals += r.goal;
  });
  let rows = Object.values(agg).map(a => {
    a.points = a._scores ? a._scores.size : 0;
    a.dPoints = a._dScores ? a._dScores.size : 0;
    a.oPoints = a._oScores ? a._oScores.size : 0;
    a.games = a._games ? a._games.size : 0;
    a.total = a.defenses - a.turnovers - a.drops + a.assists + a.goals;
    return a;
  });

  rows.sort((a, b) => {
    const va = a[statsSortCol], vb = b[statsSortCol];
    if (typeof va === 'string') return statsSortDir * va.localeCompare(vb);
    return statsSortDir * (va - vb);
  });

  renderTeamSummary(gameId);

  const isOverall = !gameId;
  const cols = [['name','Player']];
  if (isOverall) cols.push(['games','Games']);
  cols.push(['points','Points'],['dPoints','D-Points'],['oPoints','O-Points'],['pulls','Pulls'],['defenses','Defenses'],['turnovers','Turnovers'],['drops','Drops'],['assists','Assists'],['goals','Goals'],['total','Total']);

  let html = '<thead><tr>' + cols.map(([k,l]) => `<th onclick="sortStats('${k}')">${l}${statsSortCol===k?(statsSortDir===-1?' &#9660;':' &#9650;'):''}</th>`).join('') + '</tr></thead><tbody>';
  if (!rows.length) { html += '<tr><td colspan="' + cols.length + '" class="empty">No data yet</td></tr>'; }
  rows.forEach(r => {
    let cells = `<td>${esc(r.name)}</td>`;
    if (isOverall) cells += `<td>${r.games}</td>`;
    cells += `<td>${r.points}</td><td>${r.dPoints}</td><td>${r.oPoints}</td><td>${r.pulls}</td><td>${r.defenses}</td><td>${r.turnovers}</td><td>${r.drops}</td><td>${r.assists}</td><td>${r.goals}</td><td style="font-weight:600">${r.total}</td>`;
    html += `<tr>${cells}</tr>`;
  });
  html += '</tbody>';
  document.getElementById('stats-table').innerHTML = html;
  if (!gameId) renderPlayerMatrix();
  else document.getElementById('player-matrix').innerHTML = '';
}

function renderPlayerMatrix() {
  const el = document.getElementById('player-matrix');
  const logs = state.pointLog;
  if (logs.length < 2) { el.innerHTML = ''; return; }

  const playerMap = {};
  logs.forEach(r => { playerMap[r.playerId] = r.playerName; });
  const players = Object.entries(playerMap)
    .map(([id, name]) => ({ id, name }))
    .sort((a, b) => a.name.localeCompare(b.name));
  if (players.length < 2) { el.innerHTML = ''; return; }

  // group logs into unique points
  const points = new Map();
  logs.forEach(r => {
    const key = r.gameId + ':' + r.score;
    if (!points.has(key)) points.set(key, { ps: new Set(), od: r.od, won: r.weScored });
    points.get(key).ps.add(r.playerId);
  });

  // pairwise co-occurrence
  const co = {};
  points.forEach(({ ps, od, won }) => {
    const arr = [...ps];
    for (let i = 0; i < arr.length; i++) {
      for (let j = i + 1; j < arr.length; j++) {
        const key = arr[i] < arr[j] ? arr[i]+'|'+arr[j] : arr[j]+'|'+arr[i];
        if (!co[key]) co[key] = { played:0, dPlayed:0, oPlayed:0, won:0, dWon:0, oWon:0 };
        const s = co[key];
        s.played++;
        if (od === 'D') s.dPlayed++; else s.oPlayed++;
        if (won) { s.won++; if (od === 'D') s.dWon++; else s.oWon++; }
      }
    }
  });

  // per-player stats for diagonal
  const pOwn = {};
  points.forEach(({ ps: ids, od, won }) => {
    ids.forEach(id => {
      if (!pOwn[id]) pOwn[id] = { played:0, dPlayed:0, oPlayed:0, won:0, dWon:0, oWon:0 };
      const s = pOwn[id];
      s.played++;
      if (od === 'D') s.dPlayed++; else s.oPlayed++;
      if (won) { s.won++; if (od === 'D') s.dWon++; else s.oWon++; }
    });
  });

  const getS = (a, b) => co[a < b ? a+'|'+b : b+'|'+a] || null;
  const pc = (v, t) => t ? Math.round(v / t * 100) + '%' : '—';
  const heat = (won, played) => {
    if (!played) return '';
    const r = won / played;
    if (r > 0.5) return `rgba(74,158,120,${((r-0.5)*2*0.55).toFixed(2)})`;
    if (r < 0.5) return `rgba(192,80,79,${((0.5-r)*2*0.55).toFixed(2)})`;
    return '';
  };
  // render a mini 3-section cell; extraClass optionally added to <td>
  const triCell = (s, extraClass = '') => {
    if (!s || !s.played) return `<td class="mat-cell mat-empty${extraClass ? ' '+extraClass : ''}"></td>`;
    const cTop = heat(s.won, s.played);
    const cD   = heat(s.dWon, s.dPlayed);
    const cO   = heat(s.oWon, s.oPlayed);
    return `<td class="mat-cell${extraClass ? ' '+extraClass : ''}"><div class="mat-cell-inner">
      <div class="mc-top" style="background:${cTop}">
        <div class="mat-n">${s.played}</div><div class="mat-p">${pc(s.won,s.played)}</div>
      </div>
      <div class="mc-d" style="background:${cD}">
        <div class="mat-lbl">D</div>
        <div class="mat-n">${s.dPlayed}</div><div class="mat-p">${pc(s.dWon,s.dPlayed)}</div>
      </div>
      <div class="mc-o" style="background:${cO}">
        <div class="mat-lbl">O</div>
        <div class="mat-n">${s.oPlayed}</div><div class="mat-p">${pc(s.oWon,s.oPlayed)}</div>
      </div>
    </div></td>`;
  };

  let html = `<div class="mat-section"><h3>Player Matrix</h3>
    <div class="mat-scroll"><table class="mat-table"><thead><tr><th></th>`;
  players.forEach(pl => { html += `<th><div class="mat-col-hdr">${esc(pl.name)}</div></th>`; });
  html += '</tr></thead><tbody>';

  players.forEach((rowP, ri) => {
    html += `<tr><td class="mat-row-hdr">${esc(rowP.name)}</td>`;
    players.forEach((colP, ci) => {
      if (ri === ci) {
        // diagonal: player's own stats, same 3-section layout
        const s = pOwn[rowP.id] || { played:0, dPlayed:0, oPlayed:0, won:0, dWon:0, oWon:0 };
        html += triCell(s, 'mat-diag');
      } else if (ri > ci) {
        // lower triangle: show 3-section cell
        html += triCell(getS(rowP.id, colP.id));
      } else {
        // upper triangle: empty
        html += '<td class="mat-cell mat-empty"></td>';
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table></div></div>';
  el.innerHTML = html;
}

function sortStats(col) {
  if (statsSortCol === col) statsSortDir *= -1;
  else { statsSortCol = col; statsSortDir = col === 'name' ? 1 : -1; }
  renderStats(currentGameId);
}

// ─── CSV EXPORT / IMPORT ───────────────────────────────
function exportCSV() {
  let csv = 'type,id,name,gender,active,date,us,them,gameId,gameName,score,playerId,playerName,od,pull,defense,turnover,drop,assist,goal,weScored\n';
  state.players.forEach(p => {
    csv += `player,${p.id},${csvQ(p.name)},${p.gender},${p.active ? 1 : 0},,,,,,,,,,,,,,,,\n`;
  });
  state.games.forEach(g => {
    csv += `game,${g.id},,,,${g.date},${g.us},${g.them},,,,,,,,,,,,,\n`;
  });
  state.pointLog.forEach(r => {
    csv += `log,,,,,,,,,${csvQ(r.gameName)},${r.score},${r.playerId},${csvQ(r.playerName)},${r.od},${r.pull},${r.defense},${r.turnover},${r.drop},${r.assist},${r.goal},${r.weScored ? 1 : 0}\n`;
  });
  // also store gameId in log rows
  csv = csv.replace(/^(log,,,,,,,),/gm, (match) => match); // noop placeholder
  // redo log rows properly
  csv = 'type,id,name,gender,active,date,us,them,gameId,gameName,score,playerId,playerName,od,pull,defense,turnover,drop,assist,goal,weScored,division\n';
  state.players.forEach(p => {
    csv += ['player',p.id,csvQ(p.name),p.gender,p.active?1:0,'','','','','','','','','','','','','','','',''].join(',') + '\n';
  });
  state.games.forEach(g => {
    csv += ['game',g.id,csvQ(g.name),'','',g.date,g.us,g.them,'','','','','','','','','','','','','',csvQ(g.division||'')].join(',') + '\n';
  });
  state.pointLog.forEach(r => {
    csv += ['log','','','','','','','',r.gameId,csvQ(r.gameName),r.score,r.playerId,csvQ(r.playerName),r.od,r.pull,r.defense,r.turnover,r.drop,r.assist,r.goal,r.weScored?1:0].join(',') + '\n';
  });
  download('ultilytics_export.csv', csv);
}

function exportGameCSV() {
  const g = state.games.find(g => g.id === currentGameId);
  const logs = state.pointLog.filter(r => r.gameId === currentGameId);
  let csv = 'gameName,score,playerName,od,pull,defense,turnover,drop,assist,goal\n';
  logs.forEach(r => {
    csv += [csvQ(r.gameName),r.score,csvQ(r.playerName),r.od,r.pull,r.defense,r.turnover,r.drop,r.assist,r.goal].join(',') + '\n';
  });
  download(`ultilytics_${g.name.replace(/\s+/g,'_')}.csv`, csv);
}

function exportAllGamesCSV() {
  let csv = 'gameName,gameDate,score,playerName,od,pull,defense,turnover,drop,assist,goal\n';
  state.pointLog.forEach(r => {
    const g = state.games.find(g => g.id === r.gameId);
    const date = g ? g.date : '';
    csv += [csvQ(r.gameName),date,r.score,csvQ(r.playerName),r.od,r.pull,r.defense,r.turnover,r.drop,r.assist,r.goal].join(',') + '\n';
  });
  download('ultilytics_all_games.csv', csv);
}

function csvQ(s) { return s.includes(',') || s.includes('"') ? '"' + s.replace(/"/g,'""') + '"' : s; }

function download(name, content) {
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(content);
  a.download = name;
  a.click();
}

function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const lines = e.target.result.split('\n').filter(l => l.trim());
    if (lines.length < 2) return;
    const newState = defaultState();
    for (let i = 1; i < lines.length; i++) {
      const cols = parseCSVLine(lines[i]);
      const type = cols[0];
      if (type === 'player') {
        newState.players.push({ id: cols[1], name: cols[2], gender: cols[3], active: cols[4] === '1' });
      } else if (type === 'game') {
        newState.games.push({ id: cols[1], name: cols[2], date: cols[5], us: parseInt(cols[6])||0, them: parseInt(cols[7])||0, division: cols[21]||'' });
      } else if (type === 'log') {
        newState.pointLog.push({
          gameId: cols[8], gameName: cols[9], score: cols[10], playerId: cols[11], playerName: cols[12],
          od: cols[13], pull: parseInt(cols[14])||0, defense: parseInt(cols[15])||0, turnover: parseInt(cols[16])||0,
          drop: parseInt(cols[17])||0, assist: parseInt(cols[18])||0, goal: parseInt(cols[19])||0, weScored: cols[20]==='1'
        });
      }
    }
    state = newState;
    save();
    showScreen('team');
    alert('Import complete: ' + state.players.length + ' players, ' + state.games.length + ' games loaded.');
  };
  reader.readAsText(file);
  event.target.value = '';
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else cur += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { result.push(cur); cur = ''; }
      else cur += c;
    }
  }
  result.push(cur);
  return result;
}

}
